<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Lord's by DAC — Availability &amp; Booking</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#C9A84C; --gold-light:#E8CC7A;
  --dark:#0A0A0A; --dark-2:#111; --dark-3:#1A1A1A; --dark-4:#222;
  --text:#E8E0D0; --muted:#7A7060;
  --avail:#3FAE4E; --booked:#E14B4B; --blocked:#8A8A8A; --nfs:#5A5A5A;
  --border:#2A2A2A;
  --dac-navy:#1F3A5F; --dac-red:#A4282F;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--dark); color:var(--text); font-family:'DM Mono',monospace; font-size:13px; min-height:100vh; overflow-x:hidden; }

/* HEADER */
header { background:var(--dark-2); border-bottom:1px solid var(--border); padding:18px 36px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; }
.header-left { display:flex; align-items:center; gap:18px; }
.lords-logo { height:54px; width:auto; display:block; }
.brand-divider { width:1px; height:38px; background:var(--border); }
.brand-text-title { font-family:'Cormorant Garamond',serif; font-size:13px; font-weight:500; letter-spacing:2.5px; color:var(--gold); text-transform:uppercase; }
.brand-text-sub { font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-top:2px; }

.legend-row { display:flex; gap:18px; align-items:center; flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:7px; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); }
.legend-dot { width:13px; height:13px; border-radius:3px; flex-shrink:0; }

/* SUMMARY STRIP */
.summary { display:grid; grid-template-columns:repeat(4,1fr); border-bottom:1px solid var(--border); }
.summary-cell { padding:14px 36px; border-right:1px solid var(--border); display:flex; gap:10px; align-items:center; }
.summary-cell:last-child { border-right:none; }
.s-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.s-count { font-family:'Cormorant Garamond',serif; font-size:20px; line-height:1; }
.s-lbl { font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-top:1px; }

/* MAIN LAYOUT AREA */
.main-wrap { display:flex; min-height:calc(100vh - 220px); }
.map-panel { flex:1; position:relative; background:#0d0d0d; overflow:auto; padding:24px; display:flex; justify-content:center; }
.map-container { position:relative; display:inline-block; }
.map-image { display:block; width:100%; max-width:900px; height:auto; user-select:none; }

.hotspot {
  position:absolute;
  border-radius:2px;
  cursor:pointer;
  transition: all 0.15s ease;
  border: 1.5px solid transparent;
}
.hotspot:hover { transform: scale(1.04); z-index: 20; box-shadow: 0 0 0 2px rgba(255,255,255,0.4), 0 4px 16px rgba(0,0,0,0.5); }
.hotspot.available { background: rgba(63,174,78,0.40); border-color: rgba(63,174,78,0.75); }
.hotspot.booked    { background: rgba(225,75,75,0.45); border-color: rgba(225,75,75,0.8); }
.hotspot.blocked   { background: rgba(138,138,138,0.45); border-color: rgba(160,160,160,0.7); }
.hotspot.nfs       { background: rgba(90,90,90,0.35); border-color: rgba(120,120,120,0.6); }
.hotspot.selected  { box-shadow: 0 0 0 3px var(--gold-light), 0 4px 20px rgba(201,168,76,0.5); z-index: 21; }

/* SIDE PANEL */
.side-panel { width: 400px; background: var(--dark-2); border-left: 1px solid var(--border); padding: 28px; overflow-y: auto; flex-shrink: 0; }
.side-empty { color: var(--muted); font-size:12px; line-height:2; text-align:center; padding-top:80px; letter-spacing:.5px; }
.side-empty .big-icon { font-size:32px; opacity:.3; margin-bottom:16px; }

.detail-card { animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

.detail-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
.detail-villa { font-family:'Cormorant Garamond',serif; font-size:32px; font-weight:600; color:var(--gold-light); line-height:1; }
.detail-status-badge { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:3px; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; margin-top:10px; }
.detail-status-badge::before { content:""; width:7px; height:7px; border-radius:50%; }
.dsb-available { background:rgba(63,174,78,.15); color:var(--avail); border:1px solid rgba(63,174,78,.35); }
.dsb-available::before { background:var(--avail); }
.dsb-booked { background:rgba(225,75,75,.15); color:var(--booked); border:1px solid rgba(225,75,75,.4); }
.dsb-booked::before { background:var(--booked); }
.dsb-blocked { background:rgba(138,138,138,.18); color:#bbb; border:1px solid rgba(160,160,160,.4); }
.dsb-blocked::before { background:#999; }
.dsb-nfs { background:rgba(90,90,90,.15); color:#999; border:1px solid rgba(120,120,120,.3); }
.dsb-nfs::before { background:#777; }

.detail-type { font-size:11px; color:var(--muted); letter-spacing:1px; margin:14px 0 22px; padding-bottom:18px; border-bottom:1px solid var(--border); }
.detail-type span { color:var(--gold); }

.spec-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px 16px; margin-bottom:22px; }
.spec-item .spec-label { font-size:9px; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; margin-bottom:4px; }
.spec-item .spec-value { font-size:14px; color:var(--text); font-family:'DM Mono',monospace; }

.price-block { background:var(--dark-3); border:1px solid var(--border); border-radius:4px; padding:18px; margin-bottom:18px; }
.price-row { display:flex; justify-content:space-between; align-items:center; padding:7px 0; font-size:12px; }
.price-row.divider { border-top:1px solid var(--border); margin-top:6px; padding-top:14px; }
.price-row .pl { color:var(--muted); letter-spacing:.5px; }
.price-row .pv { color:var(--text); font-variant-numeric:tabular-nums; }
.price-row.total .pl { color:var(--gold); font-size:11px; letter-spacing:1.5px; text-transform:uppercase; }
.price-row.total .pv { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--gold-light); font-weight:600; }

.sold-notice { background:rgba(225,75,75,.08); border:1px solid rgba(225,75,75,.25); border-radius:4px; padding:20px; text-align:center; color:var(--booked); font-size:12px; letter-spacing:1px; line-height:1.8; }
.sold-notice .big { font-family:'Cormorant Garamond',serif; font-size:20px; margin-bottom:6px; display:block; }

.close-btn { background:transparent; border:1px solid var(--border); color:var(--muted); width:28px; height:28px; border-radius:3px; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0; }
.close-btn:hover { border-color:var(--gold); color:var(--gold); }

.book-now-btn { width:100%; padding:14px; background:var(--gold); color:var(--dark); border:none; border-radius:4px; font-family:'DM Mono',monospace; font-size:12px; letter-spacing:2px; text-transform:uppercase; font-weight:500; cursor:pointer; transition:all .15s; margin-top:4px; }
.book-now-btn:hover { background:var(--gold-light); }

/* TOAST */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--dark-2); border:1px solid var(--gold); color:var(--text); padding:10px 22px; font-size:11px; letter-spacing:1px; border-radius:3px; z-index:999; opacity:0; transition:opacity .3s; pointer-events:none; max-width:80vw; text-align:center; }
.toast.show { opacity:1; }
.toast.error { border-color:var(--booked); }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.78); z-index:500; display:none; align-items:center; justify-content:center; padding:20px; overflow-y:auto; }
.modal-overlay.show { display:flex; }
.modal-card { background:var(--dark-2); border:1px solid var(--border); border-radius:6px; max-width:560px; width:100%; max-height:90vh; overflow-y:auto; animation: modalIn 0.2s ease; }
@keyframes modalIn { from{opacity:0; transform:translateY(12px) scale(0.98);} to{opacity:1; transform:translateY(0) scale(1);} }

.modal-header { padding:22px 28px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:var(--dark-2); z-index:5; }
.modal-title { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--gold-light); font-weight:600; }
.modal-subtitle { font-size:10px; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; margin-top:3px; }

.modal-body { padding:28px; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.form-grid.full { grid-template-columns:1fr; }
.form-group { display:flex; flex-direction:column; gap:6px; }
.form-group.span2 { grid-column: span 2; }
.form-label { font-size:10px; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; }
.form-label .req { color:var(--booked); }
.form-input, .form-select {
  background:var(--dark-4); border:1px solid #333; color:var(--text);
  font-family:'DM Mono',monospace; font-size:12px; padding:10px 12px;
  border-radius:3px; outline:none; transition:border-color .15s; width:100%;
}
.form-input:focus, .form-select:focus { border-color:var(--gold); }
.form-input::placeholder { color:#555; }
.form-input:disabled, .form-input[readonly] { background:#1a1a1a; color:var(--muted); cursor:not-allowed; }
.form-input.error-field { border-color:var(--booked); }
.field-error { font-size:10px; color:var(--booked); min-height:14px; }

.form-section-title { font-size:10px; letter-spacing:2px; color:var(--gold); text-transform:uppercase; margin:24px 0 14px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.form-section-title:first-child { margin-top:0; }

.calc-display { background:var(--dark-3); border:1px solid var(--border); border-radius:4px; padding:14px 16px; }
.calc-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; font-size:12px; }
.calc-row .cl { color:var(--muted); }
.calc-row .cv { color:var(--text); font-variant-numeric:tabular-nums; }
.calc-row.highlight .cl { color:var(--gold); }
.calc-row.highlight .cv { color:var(--gold-light); font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:600; }
.calc-row.negative .cv { color:var(--booked); }
.calc-row.positive .cv { color:var(--avail); }

.modal-footer { padding:20px 28px; border-top:1px solid var(--border); display:flex; gap:12px; position:sticky; bottom:0; background:var(--dark-2); }
.btn { padding:12px 20px; border-radius:4px; font-family:'DM Mono',monospace; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; border:none; transition:all .15s; }
.btn-cancel { background:transparent; border:1px solid var(--border); color:var(--muted); flex:0 0 auto; }
.btn-cancel:hover { border-color:var(--booked); color:var(--booked); }
.btn-submit { background:var(--gold); color:var(--dark); flex:1; font-weight:500; }
.btn-submit:hover { background:var(--gold-light); }
.btn-submit:disabled { opacity:.5; cursor:not-allowed; }

.success-screen { padding:48px 28px; text-align:center; }
.success-icon { width:64px; height:64px; border-radius:50%; background:rgba(63,174,78,.15); border:2px solid var(--avail); display:flex; align-items:center; justify-content:center; margin:0 auto 24px; font-size:28px; color:var(--avail); }
.success-title { font-family:'Cormorant Garamond',serif; font-size:26px; color:var(--gold-light); font-weight:600; margin-bottom:10px; }
.success-text { color:var(--muted); font-size:12px; line-height:1.8; margin-bottom:8px; }
.success-text strong { color:var(--text); }

@media (max-width: 900px) {
  .main-wrap { flex-direction:column; }
  .side-panel { width:100%; border-left:none; border-top:1px solid var(--border); max-height:60vh; }
  .form-grid { grid-template-columns:1fr; }
  .form-group.span2 { grid-column: span 1; }
}
</style>
</head>

  <div class="summary-cell"><div class="s-dot" style="background:var(--nfs)"></div><div><div class="s-count" id="s-t" style="color:var(--text)">—</div><div class="s-lbl">Total Units</div></div></div>
</div>

<div class="main-wrap">
  <div class="map-panel">
    <div class="map-container" id="map-container">
      <img class="map-image" id="map-image" alt="The Lord's Layout Plan" />
    </div>
  </div>
  <div class="side-panel" id="side-panel">
    <div class="side-empty" id="side-empty">
      <div class="big-icon">⌖</div>
      Click any unit on the layout<br>to view full details
    </div>
    <div class="detail-card" id="detail-card" style="display:none"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- BOOKING MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-card" id="modal-card">
    <!-- content injected by JS -->
  </div>
</div>

let selectedIdx = null;

function statusClass(s) {
  if (s === "AVAILABLE") return "available";
  if (s === "BOOKED") return "booked";
  if (s === "BLOCKED") return "blocked";
  return "nfs";
}
function badgeClass(s) {
  if (s === "AVAILABLE") return "dsb-available";
  if (s === "BOOKED") return "dsb-booked";
  if (s === "BLOCKED") return "dsb-blocked";
  return "dsb-nfs";
}
function badgeLabel(s) {
  if (s === "NOT FOR SALE NOW") return "Not For Sale";
  return s.charAt(0) + s.slice(1).toLowerCase();
}
function fmtMoney(n) {
  if (!n) return "—";
  if (n >= 1e7) return "₹" + (n/1e7).toFixed(2) + " Cr";
  return "₹" + (n/1e5).toFixed(2) + " L";
}
function fmtFull(n) {
  if (!n && n !== 0) return "—";
  return "₹" + Math.round(n).toLocaleString("en-IN");
}
function fmtNum(n) {
  return n ? Math.round(n).toLocaleString("en-IN") : "—";
}

// ============================================================
// RENDER HOTSPOTS
// ============================================================
function renderHotspots() {
  const container = document.getElementById("map-container");
  container.querySelectorAll(".hotspot").forEach(el => el.remove());

  UNITS.forEach((u, idx) => {
    if (u.x === null || u.x === undefined) return;
    const div = document.createElement("div");
    div.className = "hotspot " + statusClass(u.status);
    div.dataset.idx = idx;
    const leftPct = ((u.x - HALF_W) / IMG_NATIVE_WIDTH) * 100;
    const topPct = ((u.y - HALF_H) / IMG_NATIVE_HEIGHT) * 100;
    const wPct = (HALF_W * 2 / IMG_NATIVE_WIDTH) * 100;
    const hPct = (HALF_H * 2 / IMG_NATIVE_HEIGHT) * 100;
    div.style.left = leftPct + "%";
    div.style.top = topPct + "%";
    div.style.width = wPct + "%";
    div.style.height = hPct + "%";
    div.title = u.villa + " — " + badgeLabel(u.status);
    div.addEventListener("click", () => selectUnit(idx));
    container.appendChild(div);
  });
}

  const isAvailable = u.status === "AVAILABLE";

  let pricingHtml;
  if (isAvailable) {
    pricingHtml = `
      <div class="price-block">
        <div class="price-row total"><span class="pl">TOTAL COST WITH CORPUS AND MAINTENANCE (Excl GST &amp; Reg)</span><span class="pv">${fmtMoney(u.totalCorpus)}</span></div>
      </div>
      <button class="book-now-btn" onclick="openBookingModal(${idx})">Book Now</button>
    `;
  } else if (u.status === "BOOKED") {
    pricingHtml = `<div class="sold-notice"><span class="big">This unit is sold</span>Pricing details are not shown for booked units.<br>Please ask our sales team about similar available units.</div>`;
  } else if (u.status === "BLOCKED") {
    pricingHtml = `
      <div class="price-block">
        <div class="price-row total"><span class="pl">TOTAL COST WITH CORPUS AND MAINTENANCE (Excl GST &amp; Reg)</span><span class="pv">${fmtMoney(u.totalCorpus)}</span></div>
      </div>
      <div class="sold-notice" style="color:var(--blocked);border-color:rgba(160,160,160,.25);background:rgba(138,138,138,.08);margin-top:14px;"><span class="big" style="color:var(--blocked)">Currently Blocked</span>This unit is temporarily on hold.<br>Please check back or contact our sales team.</div>
    `;
  } else {
    pricingHtml = `<div class="sold-notice" style="color:var(--nfs);border-color:rgba(120,120,120,.25);background:rgba(90,90,90,.08);"><span class="big" style="color:#999">Not For Sale</span>This unit is not currently available for sale.</div>`;
  }

  card.innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-villa">${u.villa}</div>
        <div class="detail-status-badge ${badgeClass(u.status)}">${badgeLabel(u.status)}</div>
      </div>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-type"><span>${u.type}</span> · Facing ${u.facing}</div>

    <div class="spec-grid">
      <div class="spec-item"><div class="spec-label">Land Area</div><div class="spec-value">${fmtNum(u.land)} sqft</div></div>
      <div class="spec-item"><div class="spec-label">Built-up Area</div><div class="spec-value">${u.builtup ? fmtNum(u.builtup)+' sqft' : '—'}</div></div>
      <div class="spec-item"><div class="spec-label">UDS Land</div><div class="spec-value">${u.uds ? fmtNum(u.uds)+' sqft' : '—'}</div></div>
      <div class="spec-item"><div class="spec-label">Road Width</div><div class="spec-value">${u.road}</div></div>
      <div class="spec-item"><div class="spec-label">Plot Facing</div><div class="spec-value">${u.plotFacing}</div></div>
    </div>

    ${pricingHtml}
  `;
}

function closeDetail() {
  selectedIdx = null;
  document.querySelectorAll(".hotspot").forEach(el => el.classList.remove("selected"));
  document.getElementById("detail-card").style.display = "none";
  document.getElementById("side-empty").style.display = "block";
}

function renderSummary() {
  let a=0,b=0,bl=0;
  UNITS.forEach(u => {
    if (u.status==="AVAILABLE") a++;
    else if (u.status==="BOOKED") b++;
    else if (u.status==="BLOCKED") bl++;
  });
  document.getElementById("s-a").textContent = a;
  document.getElementById("s-b").textContent = b;
  document.getElementById("s-bl").textContent = bl;
  document.getElementById("s-t").textContent = UNITS.length;
}

function toast(msg, isError) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (isError ? " error" : "");
  setTimeout(()=>{ t.classList.remove("show"); }, 3500);
}

<script>
// ============================================================
// BOOKING MODAL
// ============================================================
let bookingUnitIdx = null;

function openBookingModal(idx) {
  bookingUnitIdx = idx;
  const u = UNITS[idx];

  // Re-check status hasn't changed (in case of stale data)
  if (u.status !== "AVAILABLE") {
    toast("This unit is no longer available.", true);
    selectUnit(idx);
    return;
  }

  const modal = document.getElementById("modal-card");
  modal.innerHTML = `
    <div class="modal-header">
      <div>
        <div class="modal-title">Book ${u.villa}</div>
        <div class="modal-subtitle">The Lord's by DAC · Booking Form</div>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">

      <div class="form-section-title">Customer Details</div>
      <div class="form-grid">
        <div class="form-group span2">
          <label class="form-label">Customer Name <span class="req">*</span></label>
          <input type="text" class="form-input" id="f-name" placeholder="Full name" autocomplete="off">
          <div class="field-error" id="err-name"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Mobile Number <span class="req">*</span></label>
          <input type="tel" class="form-input" id="f-mobile" placeholder="10-digit mobile" maxlength="10" autocomplete="off">
          <div class="field-error" id="err-mobile"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Email ID <span class="req">*</span></label>
          <input type="email" class="form-input" id="f-email" placeholder="name@example.com" autocomplete="off">
          <div class="field-error" id="err-email"></div>
        </div>
        <div class="form-group span2">
          <label class="form-label">Sell.do Lead ID</label>
          <input type="text" class="form-input" id="f-leadid" placeholder="Optional — paste Sell.do Lead ID" autocomplete="off">
        </div>
      </div>

      <div class="form-section-title">Unit Details</div>
      <div class="form-grid">
        <div class="form-group span2">
          <label class="form-label">Project Name</label>
          <input type="text" class="form-input" id="f-project" value="The Lord's by DAC" readonly>
        </div>
        <div class="form-group">
          <label class="form-label">Unit Number</label>
          <input type="text" class="form-input" id="f-unit" value="${u.villa}" readonly>
        </div>
        <div class="form-group">
          <label class="form-label">Unit Type</label>
          <input type="text" class="form-input" id="f-unittype" value="${u.type}" readonly>
        </div>
        <div class="form-group">
          <label class="form-label">Land Area</label>
          <input type="text" class="form-input" value="${fmtNum(u.land)} sqft" readonly>
        </div>
        <div class="form-group">
          <label class="form-label">Built-up Area</label>
          <input type="text" class="form-input" value="${u.builtup ? fmtNum(u.builtup)+' sqft' : '—'}" readonly>
        </div>
      </div>

      <div class="form-section-title">Pricing</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Listed Price</label>
          <input type="text" class="form-input" id="f-listed" value="${fmtFull(u.totalFinal)}" readonly>
        </div>
        <div class="form-group">
          <label class="form-label">Final Sale Price <span class="req">*</span></label>
          <input type="number" class="form-input" id="f-finalprice" placeholder="Enter agreed price" value="${Math.round(u.totalFinal)}">
          <div class="field-error" id="err-finalprice"></div>
        </div>
      </div>

      <div class="calc-display" style="margin-top:14px;">
        <div class="calc-row"><span class="cl">Listed Price</span><span class="cv" id="calc-listed">${fmtFull(u.totalFinal)}</span></div>
        <div class="calc-row"><span class="cl">Final Sale Price</span><span class="cv" id="calc-final">${fmtFull(u.totalFinal)}</span></div>
        <div class="calc-row highlight" id="calc-discount-row"><span class="cl">Discount</span><span class="cv" id="calc-discount">₹0</span></div>
      </div>

      <div class="form-section-title">Booking Advance</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Advance Amount <span class="req">*</span></label>
          <input type="number" class="form-input" id="f-advance" placeholder="e.g. 500000">
          <div class="field-error" id="err-advance"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Mode of Payment <span class="req">*</span></label>
          <select class="form-select" id="f-paymode">
            <option value="">Select mode</option>
            <option value="Cheque">Cheque</option>
            <option value="NEFT/RTGS">NEFT / RTGS</option>
            <option value="UPI">UPI</option>
            <option value="Credit Card">Credit Card</option>
            <option value="Cash">Cash</option>
            <option value="Bank Loan Disbursement">Bank Loan Disbursement</option>
          </select>
          <div class="field-error" id="err-paymode"></div>
        </div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-submit" id="btn-submit-booking" onclick="submitBooking()">Confirm Booking</button>
    </div>
  `;

  document.getElementById("f-finalprice").addEventListener("input", updateDiscountCalc);
  updateDiscountCalc();

  document.getElementById("modal-overlay").classList.add("show");
}

function updateDiscountCalc() {
  const u = UNITS[bookingUnitIdx];
  const listed = u.totalFinal;
  const finalVal = parseFloat(document.getElementById("f-finalprice").value) || 0;
  const discount = listed - finalVal;

  document.getElementById("calc-listed").textContent = fmtFull(listed);
  document.getElementById("calc-final").textContent = fmtFull(finalVal);
  const discRow = document.getElementById("calc-discount-row");
  const discEl = document.getElementById("calc-discount");

  if (discount > 0) {
    discEl.textContent = "− " + fmtFull(discount);
    discRow.className = "calc-row highlight negative";
  } else if (discount < 0) {
    discEl.textContent = "+ " + fmtFull(Math.abs(discount));
    discRow.className = "calc-row highlight positive";
  } else {
    discEl.textContent = "₹0";
    discRow.className = "calc-row highlight";
  }
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("show");
  bookingUnitIdx = null;
}

function clearErrors() {
  document.querySelectorAll(".field-error").forEach(el => el.textContent = "");
  document.querySelectorAll(".form-input").forEach(el => el.classList.remove("error-field"));
}

function showFieldError(fieldId, errId, msg) {
  document.getElementById(errId).textContent = msg;
  document.getElementById(fieldId).classList.add("error-field");
}

function validateBookingForm() {
  clearErrors();
  let valid = true;

  const name = document.getElementById("f-name").value.trim();
  if (!name) { showFieldError("f-name","err-name","Customer name is required"); valid = false; }

  const mobile = document.getElementById("f-mobile").value.trim();
  if (!/^[6-9]\d{9}$/.test(mobile)) { showFieldError("f-mobile","err-mobile","Enter a valid 10-digit mobile number"); valid = false; }

  const email = document.getElementById("f-email").value.trim();
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showFieldError("f-email","err-email","Enter a valid email address"); valid = false; }

  const finalPrice = parseFloat(document.getElementById("f-finalprice").value);
  if (!finalPrice || finalPrice <= 0) { showFieldError("f-finalprice","err-finalprice","Enter a valid sale price"); valid = false; }

  const advance = parseFloat(document.getElementById("f-advance").value);
  if (!advance || advance <= 0) { showFieldError("f-advance","err-advance","Enter the advance amount"); valid = false; }

  const paymode = document.getElementById("f-paymode").value;
  if (!paymode) { showFieldError("f-paymode","err-paymode","Select a payment mode"); valid = false; }

  return valid;
}

async function submitBooking() {
  if (!validateBookingForm()) {
    toast("Please fix the highlighted fields", true);
    return;
  }

  const u = UNITS[bookingUnitIdx];
  const btn = document.getElementById("btn-submit-booking");
  btn.disabled = true;
  btn.textContent = "Submitting…";

  const payload = {
    action: "book",
    customerName: document.getElementById("f-name").value.trim(),
    mobile: document.getElementById("f-mobile").value.trim(),
    email: document.getElementById("f-email").value.trim(),
    leadId: document.getElementById("f-leadid").value.trim(),
    projectName: "The Lord's by DAC",
    unitNumber: u.villa,
    unitType: u.type,
    facing: u.facing,
    road: u.road,
    landSqft: u.land,
    builtupSqft: u.builtup,
    listedPrice: Math.round(u.totalFinal),
    finalPrice: Math.round(parseFloat(document.getElementById("f-finalprice").value)),
    discount: Math.round(u.totalFinal - parseFloat(document.getElementById("f-finalprice").value)),
    advanceAmount: Math.round(parseFloat(document.getElementById("f-advance").value)),
    paymentMode: document.getElementById("f-paymode").value
  };

  if (!APPS_SCRIPT_URL) {
    showSetupPrompt();
    btn.disabled = false;
    btn.textContent = "Confirm Booking";
    return;
  }

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" }, // avoids CORS preflight on Apps Script
      body: JSON.stringify(payload)
    });
    const result = await res.json();
    if (result.success) {
      // Update local state
      u.status = "BOOKED";
      renderHotspots();
      renderSummary();
      showSuccessScreen(u, payload);
    } else {
      toast(result.error || "Booking failed. Please try again.", true);
      btn.disabled = false;
      btn.textContent = "Confirm Booking";
    }
  } catch (e) {
    toast("Network error: " + e.message, true);
    btn.disabled = false;
    btn.textContent = "Confirm Booking";
  }
}

function showSuccessScreen(u, payload) {
  const modal = document.getElementById("modal-card");
  modal.innerHTML = `
    <div class="success-screen">
      <div class="success-icon">✓</div>
      <div class="success-title">Booking Confirmed</div>
      <div class="success-text"><strong>${u.villa}</strong> has been booked for <strong>${payload.customerName}</strong>.</div>
      <div class="success-text">Final Price: <strong>${fmtFull(payload.finalPrice)}</strong> · Advance: <strong>${fmtFull(payload.advanceAmount)}</strong></div>
      <div class="success-text" style="margin-top:16px;color:var(--muted);font-size:11px;">The inventory and booking log have been updated.</div>
      <button class="btn btn-submit" style="margin-top:24px;" onclick="closeModal(); closeDetail();">Done</button>
    </div>
  `;
}

function showSetupPrompt() {
  const modal = document.getElementById("modal-card");
  modal.innerHTML = `
    <div class="modal-header">
      <div>
        <div class="modal-title">Connect Booking Backend</div>
        <div class="modal-subtitle">One-time setup required</div>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div style="background:#0d1a0d;border:1px solid #1a3a1a;border-radius:4px;padding:16px;margin-bottom:16px;font-size:11px;line-height:2;color:#9a9080;">
        Bookings need an Apps Script Web App URL to write to your Google Sheet.<br>
        Paste your deployed Web App URL below (ends in <code style="color:#E8CC7A;background:#111;padding:1px 6px;">/exec</code>).
      </div>
      <input type="text" class="form-input" id="f-script-url" placeholder="https://script.google.com/macros/s/…/exec">
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-submit" onclick="saveScriptUrl()">Save &amp; Retry</button>
    </div>
  `;
}

function saveScriptUrl() {
  const url = document.getElementById("f-script-url").value.trim();
  if (!url) { toast("Please paste a Web App URL", true); return; }
  APPS_SCRIPT_URL = url;
  localStorage.setItem("lords_apps_script_url", url);
  toast("Backend connected — reopening booking form");
  openBookingModal(bookingUnitIdx);
}
</script>
</body>
</html>
